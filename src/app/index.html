<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <span id="status-dot" class="dot dot--off"></span>
    <span class="brand">OpenClaw</span>
    <div id="tab-bar">
      <button id="tab-chat" class="tab-btn tab-btn--active">对话</button>
      <button id="tab-settings" class="tab-btn">设置</button>
    </div>
    <div id="agent-selector"></div>
    <div id="session-selector"></div>
    <button id="tasks-toggle" class="btn-icon">任务 ▶</button>
  </header>

  <!-- Main area -->
  <div id="main">
    <!-- Chat view -->
    <div id="chat-area">
      <div id="messages"></div>
    </div>
    <!-- Settings view -->
    <div id="settings-panel" class="hidden">
      <h2>设置</h2>
      <div class="settings-group">
        <label for="settings-path">OpenClaw 配置路径</label>
        <div class="settings-row">
          <input id="settings-path" type="text" placeholder="~/.openclaw" />
          <button id="btn-save-path" class="btn-primary">保存</button>
        </div>
        <p class="settings-hint">指向 OpenClaw 的配置目录，里面有 agents/ 文件夹</p>
      </div>
      <div class="settings-group">
        <label>显示</label>
        <div class="toggle-row">
          <span>显示思考过程</span>
          <label class="toggle-switch">
            <input type="checkbox" id="setting-show-thinking">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <span>显示工具调用</span>
          <label class="toggle-switch">
            <input type="checkbox" id="setting-show-tool-calls">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="settings-group">
        <label>通话</label>
        <div class="toggle-row">
          <span>打断模式</span>
          <select id="setting-call-queue-mode">
            <option value="interrupt">打断</option>
            <option value="queue">排队</option>
          </select>
        </div>
        <div class="toggle-row">
          <span>注入副语言特征</span>
          <label class="toggle-switch">
            <input type="checkbox" id="setting-inject-para">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>
    <aside id="tasks-sidebar" class="sidebar--hidden">
      <div id="tasks-panel"></div>
    </aside>
  </div>

  <!-- Input bar -->
  <footer id="input-bar">
    <!-- Normal mode -->
    <div id="input-normal">
      <button id="btn-dictate" class="btn-icon" title="听写">🎤</button>
      <textarea id="text-input" rows="1" placeholder="输入消息，或点击🎤听写…"></textarea>
      <button id="btn-send" class="btn-primary">↑</button>
      <button id="btn-call" class="btn-icon btn-call" title="开始通话">📞</button>
    </div>
    <!-- Call mode (hidden by default) -->
    <div id="input-call" class="hidden">
      <div id="call-init-hint" class="call-init-hint">⏳ 正在初始化麦克风…</div>
      <div id="call-ready-area" class="hidden">
        <div class="wave-container">
          <canvas id="wave-user" width="200" height="60"></canvas>
          <span class="wave-label">你</span>
          <span class="wave-label">Agent</span>
          <canvas id="wave-agent" width="200" height="60"></canvas>
        </div>
      </div>
      <button id="btn-hangup" class="btn-danger">🔴 挂断</button>
    </div>
  </footer>

  <script type="module" src="main.js"></script>
</body>
</html>
