<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceClaw WebSocket 测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .status-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 13px;
      flex-wrap: wrap;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
    }
    .status-dot.ready { background: #4caf50; }
    .status-dot.error { background: #f44336; }
    .status-dot.pending { background: #ff9800; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .agent-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .agent-selector label {
      color: #888;
      font-size: 12px;
    }
    select {
      padding: 6px 12px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    select:focus {
      border-color: #00d4ff;
    }
    select:disabled {
      opacity: 0.5;
    }
    .input-area {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: #00d4ff;
    }
    input[type="text"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) {
      opacity: 0.9;
    }
    button:active:not(:disabled) {
      transform: scale(0.98);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .chat-container {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      min-height: 400px;
      max-height: 600px;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      background: linear-gradient(135deg, #00d4ff22, #7b2cbf22);
      border-left: 3px solid #00d4ff;
      margin-left: 40px;
    }
    .message.assistant {
      background: #252525;
      border-left: 3px solid #7b2cbf;
      margin-right: 40px;
    }
    .message.system {
      background: transparent;
      border: 1px dashed #333;
      color: #666;
      font-size: 12px;
      text-align: center;
    }
    .message-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .message.user .message-label { color: #00d4ff; }
    .message.assistant .message-label { color: #a855f7; }
    .streaming-text {
      white-space: pre-wrap;
    }
    .event-debug {
      margin-top: 20px;
      padding: 16px;
      background: #0a0a0a;
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
      color: #666;
      max-height: 200px;
      overflow-y: auto;
    }
    .event-debug summary {
      cursor: pointer;
      color: #888;
      margin-bottom: 8px;
    }
    .event-debug pre {
      color: #4caf50;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 20px;
    }
    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: #7b2cbf;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>VoiceClaw WebSocket 测试</h1>
    <p class="subtitle">通过 OpenClaw Gateway 测试 voice agent</p>

    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot" id="device-dot"></span>
        <span id="device-status">检查设备...</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="conn-dot"></span>
        <span id="conn-status">未连接</span>
      </div>
      <div class="agent-selector">
        <label>Agent:</label>
        <select id="agent-select" disabled>
          <option value="">加载中...</option>
        </select>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="message-input"
        placeholder="输入消息..."
        disabled
        autocomplete="off"
      />
      <button id="send-btn" disabled>发送</button>
    </div>

    <div class="chat-container" id="chat-container">
      <div class="message system">
        等待设备就绪...
      </div>
    </div>

    <details class="event-debug">
      <summary>原始事件日志</summary>
      <div id="event-log"></div>
    </details>
  </div>

  <script>
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const chatContainer = document.getElementById('chat-container');
    const eventLog = document.getElementById('event-log');
    const deviceDot = document.getElementById('device-dot');
    const deviceStatus = document.getElementById('device-status');
    const connDot = document.getElementById('conn-dot');
    const connStatus = document.getElementById('conn-status');
    const agentSelect = document.getElementById('agent-select');

    let isReady = false;
    let currentStreamingDiv = null;
    let agents = [];

    // Check device status and load agents
    async function checkStatus() {
      try {
        // Check device
        const res = await fetch('/api/status');
        const data = await res.json();

        if (!data.hasDevice) {
          deviceDot.className = 'status-dot error';
          deviceStatus.textContent = 'Device: 未配对';
          addSystemMessage('设备未配对，请先运行配对命令');
          return;
        }

        deviceDot.className = 'status-dot ready';
        deviceStatus.textContent = 'Device: ' + data.deviceId;

        // Load agents
        try {
          const agentsRes = await fetch('/api/agents');
          const agentsData = await agentsRes.json();

          if (agentsData.error) {
            throw new Error(agentsData.error);
          }

          agents = agentsData.agents || [];
          agentSelect.innerHTML = '';

          if (agents.length === 0) {
            agentSelect.innerHTML = '<option value="">无可用 agent</option>';
          } else {
            agents.forEach(agent => {
              const option = document.createElement('option');
              option.value = agent.id;
              option.textContent = agent.id + (agent.isDefault ? ' (默认)' : '');
              agentSelect.appendChild(option);
            });
            agentSelect.disabled = false;
          }

          isReady = true;
          enableInput();
          addSystemMessage(`设备已就绪，已加载 ${agents.length} 个 agent`);
        } catch (err) {
          agentSelect.innerHTML = '<option value="">加载失败</option>';
          addSystemMessage('加载 agents 失败: ' + err.message);
        }
      } catch (err) {
        deviceDot.className = 'status-dot error';
        deviceStatus.textContent = 'Device: 检查失败';
        addSystemMessage('检查设备状态失败: ' + err.message);
      }
    }

    function enableInput() {
      messageInput.disabled = false;
      sendBtn.disabled = false;
      agentSelect.disabled = false;
      messageInput.focus();
    }

    function addMessage(role, text, isStreaming = false) {
      const div = document.createElement('div');
      div.className = 'message ' + role;

      const label = document.createElement('div');
      label.className = 'message-label';
      label.textContent = role === 'user' ? 'You' : role === 'assistant' ? 'Assistant' : 'System';
      div.appendChild(label);

      const content = document.createElement('div');
      content.className = 'streaming-text';
      content.textContent = text;
      div.appendChild(content);

      if (isStreaming) {
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.innerHTML = '<span></span><span></span><span></span>';
        indicator.id = 'typing';
        div.appendChild(indicator);
        currentStreamingDiv = content;
      }

      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function addSystemMessage(text) {
      chatContainer.innerHTML = '<div class="message system">' + text + '</div>';
    }

    function logEvent(event) {
      const pre = document.createElement('pre');
      pre.textContent = JSON.stringify(event, null, 2);
      eventLog.appendChild(pre);
      eventLog.scrollTop = eventLog.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      const agentId = agentSelect.value;

      if (!message) return;
      if (!agentId) {
        alert('请选择一个 agent');
        return;
      }

      messageInput.value = '';
      addMessage('user', message);

      const assistantDiv = addMessage('assistant', '', true);
      connDot.className = 'status-dot pending';
      connStatus.textContent = '发送中...';
      agentSelect.disabled = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, agentId }),
        });

        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.error || '请求失败');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';

        connDot.className = 'status-dot ready';
        connStatus.textContent = '接收中...';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;

            const data = line.slice(6);
            if (data === '[DONE]' || data === '[TIMEOUT]') {
              const typing = document.getElementById('typing');
              if (typing) typing.remove();
              currentStreamingDiv = null;
              connStatus.textContent = '已完成';
              agentSelect.disabled = false;
              break;
            }

            try {
              const event = JSON.parse(data);
              logEvent(event);

              if (event.event === 'chat') {
                const payload = event.payload;

                if (payload.state === 'delta') {
                  const content = payload.message?.content || [];
                  const text = content.map(c => c.text || '').join('');
                  fullText += text;
                  if (currentStreamingDiv) {
                    currentStreamingDiv.textContent = fullText;
                  }
                } else if (payload.state === 'final') {
                  const typing = document.getElementById('typing');
                  if (typing) typing.remove();
                  currentStreamingDiv = null;
                  connStatus.textContent = '已完成';
                  agentSelect.disabled = false;
                } else if (payload.state === 'error') {
                  const typing = document.getElementById('typing');
                  if (typing) typing.remove();
                  if (currentStreamingDiv) {
                    currentStreamingDiv.textContent = '错误: ' + (payload.errorMessage || '未知错误');
                  }
                  connStatus.textContent = '错误';
                  connDot.className = 'status-dot error';
                  agentSelect.disabled = false;
                }
              } else if (event.event === 'subagent_announce') {
                const payload = event.payload;
                const subagentDiv = document.createElement('div');
                subagentDiv.className = 'message system';
                subagentDiv.style.borderColor = '#ff9800';
                subagentDiv.innerHTML = '<div class="message-label" style="color:#ff9800">Subagent</div>' +
                  '<div>' + (payload.text || '子任务完成') + '</div>';
                chatContainer.appendChild(subagentDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
              }
            } catch (e) {
              console.error('Parse error:', e);
            }
          }
        }
      } catch (err) {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
        if (currentStreamingDiv) {
          currentStreamingDiv.textContent = '错误: ' + err.message;
        }
        connDot.className = 'status-dot error';
        connStatus.textContent = '失败';
        agentSelect.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Init
    checkStatus();
  </script>
</body>
</html>
