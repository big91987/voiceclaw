<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VoiceClaw - 语音通话</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow: hidden;
    }
    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    .status-ring {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s ease;
    }
    .status-ring.idle {
      background: rgba(100, 100, 100, 0.2);
      border: 3px solid rgba(100, 100, 100, 0.3);
    }
    .status-ring.connecting {
      background: rgba(255, 193, 7, 0.2);
      border: 3px solid rgba(255, 193, 7, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-ring.listening {
      background: rgba(33, 150, 243, 0.2);
      border: 3px solid #2196F3;
      animation: breathe 2s ease-in-out infinite;
    }
    .status-ring.speaking {
      background: rgba(76, 175, 80, 0.2);
      border: 3px solid #4CAF50;
      animation: ripple 0.5s ease-in-out infinite;
    }
    .status-ring.thinking {
      background: rgba(156, 39, 176, 0.2);
      border: 3px solid #9C27B0;
      animation: spin 2s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(33, 150, 243, 0.3); }
      50% { transform: scale(1.02); box-shadow: 0 0 40px rgba(33, 150, 243, 0.5); }
    }
    @keyframes ripple {
      0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
      100% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .status-text {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      min-height: 30px;
    }
    .transcript-container {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 15px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .transcript-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .transcript-user, .transcript-ai {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .transcript-user {
      background: rgba(33, 150, 243, 0.2);
      border-left: 3px solid #2196F3;
      color: #fff;
      align-self: flex-start;
      max-width: 90%;
    }
    .transcript-user::before {
      content: '👤 ';
    }
    .transcript-ai {
      background: rgba(76, 175, 80, 0.2);
      border-left: 3px solid #4CAF50;
      color: #fff;
      align-self: flex-end;
      max-width: 90%;
    }
    .transcript-ai::before {
      content: '🦞 ';
    }
    .transcript-empty {
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }
    .partial-text {
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
    }
    .controls {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      color: #fff;
    }
    .btn:active {
      transform: scale(0.95);
    }
    .btn-connect {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      box-shadow: 0 4px 20px rgba(76, 175, 80, 0.5);
    }
    .btn-connect:hover {
      box-shadow: 0 6px 25px rgba(76, 175, 80, 0.6);
    }
    .btn-disconnect {
      background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
      box-shadow: 0 4px 20px rgba(244, 67, 54, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .btn-disconnect:hover {
      box-shadow: 0 6px 25px rgba(244, 67, 54, 0.6);
    }
    .btn-icon {
      font-size: 28px;
    }
    .agent-selector {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .agent-selector option {
      background: #1a1a2e;
      color: #fff;
    }
    .volume-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
    }
    .volume-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      transition: width 50ms ease;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <select class="agent-selector" id="agentSelect">
      <option value="">选择 Agent...</option>
    </select>

    <div class="status-ring idle" id="statusRing">
      <div class="avatar">🦞</div>
    </div>

    <div class="status-text" id="statusText">点击按钮开始通话</div>

    <div class="volume-bar">
      <div class="volume-fill" id="volumeFill" style="width: 0%"></div>
    </div>

    <div class="transcript-container" id="transcriptContainer">
      <div class="transcript-empty" id="emptyHint">对话内容将显示在这里</div>
    </div>

    <div class="controls">
      <button class="btn btn-connect" id="callBtn">
        <span class="btn-icon" id="callBtnIcon">📞</span>
        <span id="callBtnText">连接</span>
      </button>
    </div>
  </div>

  <script>
    const statusRing = document.getElementById('statusRing');
    const statusText = document.getElementById('statusText');
    const transcriptContainer = document.getElementById('transcriptContainer');
    const emptyHint = document.getElementById('emptyHint');
    const callBtn = document.getElementById('callBtn');
    const callBtnIcon = document.getElementById('callBtnIcon');
    const callBtnText = document.getElementById('callBtnText');
    const agentSelect = document.getElementById('agentSelect');
    const volumeFill = document.getElementById('volumeFill');

    let ws = null;
    let audioContext = null;
    let mediaStream = null;
    let processor = null;
    let isRunning = false;
    let asrReady = false;
    let currentPartialDiv = null;
    let currentAiDiv = null;
    let lastUserText = '';

    // 加载 agent 列表
    async function loadAgents() {
      try {
        const res = await fetch('/api/agents');
        const agents = await res.json();
        agentSelect.innerHTML = '<option value="">选择 Agent...</option>' +
          agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
      } catch (e) {
        console.error('加载 agent 失败:', e);
      }
    }

    function setStatus(status, text) {
      statusRing.className = 'status-ring ' + status;
      statusText.textContent = text;
    }

    function hideEmptyHint() {
      if (emptyHint) emptyHint.style.display = 'none';
    }

    function addUserTranscript(text, isPartial = false) {
      hideEmptyHint();

      // 去重：如果和上次最终文本相同，忽略
      if (!isPartial && text === lastUserText) {
        return;
      }

      if (isPartial) {
        // 更新临时转录 - 同一个气泡更新
        if (!currentPartialDiv) {
          currentPartialDiv = document.createElement('div');
          currentPartialDiv.className = 'transcript-user';
          transcriptContainer.appendChild(currentPartialDiv);
        }
        currentPartialDiv.textContent = '👤 ' + text;
      } else {
        // 最终结果
        lastUserText = text;
        if (currentPartialDiv) {
          currentPartialDiv.textContent = '👤 ' + text;
          currentPartialDiv = null;
        } else {
          const div = document.createElement('div');
          div.className = 'transcript-user';
          div.textContent = '👤 ' + text;
          transcriptContainer.appendChild(div);
        }
      }
      transcriptContainer.scrollTop = transcriptContainer.scrollHeight;
    }

    function addAiTranscript(text, isComplete = false) {
      console.log('[AI]', isComplete ? 'complete' : 'text', text?.substring(0, 30), 'currentAiDiv=', !!currentAiDiv);
      hideEmptyHint();

      if (isComplete) {
        console.log('[AI] resetting currentAiDiv');
        currentAiDiv = null;
        return;
      }

      // AI 开始回复时，清除用户临时转录（只在开始时）
      if (!currentAiDiv) {
        console.log('[AI] creating new div');
        currentPartialDiv = null;
        currentAiDiv = document.createElement('div');
        currentAiDiv.className = 'transcript-ai';
        transcriptContainer.appendChild(currentAiDiv);
      }

      currentAiDiv.textContent = text;
      transcriptContainer.scrollTop = transcriptContainer.scrollHeight;
    }

    function clearTranscript() {
      transcriptContainer.innerHTML = '<div class="transcript-empty">对话内容将显示在这里</div>';
      currentPartialDiv = null;
      currentAiDiv = null;
      lastUserText = '';
    }

    function updateVolume(analyser) {
      if (!isRunning || !analyser) return;
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(dataArray);
      const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
      volumeFill.style.width = Math.min(average * 2, 100) + '%';
      if (isRunning) requestAnimationFrame(() => updateVolume(analyser));
    }

    function updateCallButton(connected) {
      if (connected) {
        callBtn.className = 'btn btn-disconnect';
        callBtnIcon.textContent = '📵';
        callBtnText.textContent = '断开';
      } else {
        callBtn.className = 'btn btn-connect';
        callBtnIcon.textContent = '📞';
        callBtnText.textContent = '连接';
      }
    }

    async function startCall() {
      const agentId = agentSelect.value;
      if (!agentId) {
        alert('请先选择一个 Agent');
        return;
      }

      try {
        setStatus('connecting', '正在连接...');
        updateCallButton(true);

        // 获取麦克风权限
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 16000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });

        // 创建音频上下文
        audioContext = new AudioContext({ sampleRate: 16000 });
        const source = audioContext.createMediaStreamSource(mediaStream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        // 创建音频处理节点
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(processor);
        processor.connect(audioContext.destination);

        // 连接 WebSocket (根据当前协议自动选择 ws/wss)
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${location.host}/ws/call?agentId=${encodeURIComponent(agentId)}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          setStatus('connecting', 'ASR 初始化中，请稍候...');
          isRunning = true;
          asrReady = false;
          updateVolume(analyser);
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case 'user_partial':
              console.log('[ASR] partial:', msg.text);
              addUserTranscript(msg.text, true);
              break;
            case 'user_transcript':
              console.log('[ASR] final:', msg.text);
              addUserTranscript(msg.text, false);
              break;
            case 'ai_transcript':
              addAiTranscript(msg.text, false);
              break;
            case 'ai_start':
              setStatus('speaking', 'AI 正在说话...');
              break;
            case 'ai_end':
              addAiTranscript('', true);
              setStatus('listening', '正在聆听...');
              break;
            case 'asr_ready':
              asrReady = true;
              console.log('[ASR] 就绪，可以开始说话');
              setStatus('listening', '正在聆听...');
              break;
              currentPartialDiv = null;
              setStatus('thinking', 'AI 思考中...');
              break;
            case 'interrupted':
              setStatus('listening', '被打断，重新聆听...');
              break;
            case 'error':
              setStatus('idle', '错误: ' + msg.message);
              stopCall();
              break;
          }
        };

        ws.onerror = (err) => {
          console.error('WebSocket 错误:', err);
          setStatus('idle', '连接错误');
          stopCall();
        };

        ws.onclose = () => {
          if (isRunning) stopCall();
        };

        // 发送音频数据
        let audioFrameCount = 0;
        let lastAudioLog = 0;
        processor.onaudioprocess = (e) => {
          if (!isRunning || !asrReady || ws?.readyState !== WebSocket.OPEN) {
            if (!asrReady && Date.now() - lastAudioLog > 1000) {
              console.log('[Audio] 等待 ASR 就绪...');
              lastAudioLog = Date.now();
            }
            if (Date.now() - lastAudioLog > 1000) {
              console.log('[Audio] BLOCKED: isRunning=' + isRunning + ', wsState=' + ws?.readyState);
              lastAudioLog = Date.now();
            }
            return;
          }

          audioFrameCount++;
          if (audioFrameCount % 50 === 0) {
            console.log('[Audio] Sending frame #' + audioFrameCount);
          }

          const inputData = e.inputBuffer.getChannelData(0);
          // 转换为 16-bit PCM
          const pcmData = new Int16Array(inputData.length);
          for (let i = 0; i < inputData.length; i++) {
            const s = Math.max(-1, Math.min(1, inputData[i]));
            pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }

          ws.send(pcmData.buffer);
        };

      } catch (err) {
        console.error('启动失败:', err);
        setStatus('idle', '启动失败: ' + err.message);
        updateCallButton(false);
      }
    }

    function stopCall() {
      isRunning = false;
      asrReady = false;

      if (processor) {
        processor.disconnect();
        processor = null;
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }

      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      if (ws) {
        ws.close();
        ws = null;
      }

      setStatus('idle', '点击按钮开始通话');
      updateCallButton(false);
      volumeFill.style.width = '0%';
      currentPartialDiv = null;
      currentAiDiv = null;
    }

    function toggleCall() {
      if (isRunning) {
        stopCall();
      } else {
        startCall();
      }
    }

    callBtn.addEventListener('click', toggleCall);

    loadAgents();
  </script>
</body>
</html>
